- name: Check if Docker is installed
  command: docker --version
  register: docker_check
  failed_when: false
  changed_when: false

- name: Clone repository if not present
  ansible.builtin.git:
    repo: "{{ repo_url }}"
    dest: "{{ repo_dir }}"
    version: master
    update: yes
  become_user: "{{ kiosk_user }}"
  when: repo_url is defined and repo_dir is defined

- name: Install Docker if not present
  block:
    - name: Download Docker installation script
      get_url:
        url: https://get.docker.com
        dest: /tmp/get-docker.sh
        mode: '0755'

    - name: Run Docker installation script
      shell: /tmp/get-docker.sh

    - name: Add user to docker group
      user:
        name: "{{ kiosk_user }}"
        groups: docker
        append: yes

    - name: Remove Docker installation script
      file:
        path: /tmp/get-docker.sh
        state: absent

    - name: Check Docker version
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Show Docker version
      ansible.builtin.debug:
        msg: "{{ docker_version.stdout }}"
  when: docker_check.rc != 0
  become: true

- name: Check Docker Compose availability
  command: docker compose version
  register: docker_compose_check
  failed_when: false
  changed_when: false

- name: Aggressive cleanup - stop all containers
  ansible.builtin.shell: |
    docker stop $(docker ps -aq) 2>/dev/null || true
  become: true
  changed_when: false

- name: Aggressive cleanup - remove all containers
  ansible.builtin.shell: |
    docker rm -f $(docker ps -aq) 2>/dev/null || true
  become: true
  changed_when: false

- name: Aggressive cleanup - remove unused volumes
  ansible.builtin.shell: |
    docker volume prune -f 2>/dev/null || true
  become: true
  changed_when: false

- name: Aggressive cleanup - remove unused networks
  ansible.builtin.shell: |
    docker network prune -f 2>/dev/null || true
  become: true
  changed_when: false

- name: Stop and remove existing containers (if any)
  ansible.builtin.shell: |
    cd {{ repo_dir }}
    docker compose -f docker-compose.yml down || true
  become: true
  become_user: "{{ kiosk_user }}"
  changed_when: false

- name: Run Docker Compose (Headless mode with Pi override)
  ansible.builtin.shell: |
    cd {{ repo_dir }}
    docker compose -f docker-compose.yml up -d --build 2>&1 | tail -50
  register: compose_output
  changed_when: "'up-to-date' not in compose_output.stdout and 'already exists' not in compose_output.stdout"
  become: true
  become_user: "{{ kiosk_user }}"

- name: Prune unused Docker images (dangling only)
  community.docker.docker_prune:
    images: true
    images_filters:
      dangling: "true"

- name: Print Docker Compose output
  debug:
    msg: "{{ compose_output }}"
  when: compose_output is defined

