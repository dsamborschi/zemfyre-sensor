services:
    mosquitto:
        image: eclipse-mosquitto
        restart: always
        ports:
          - "${MOSQUITTO_PORT_EXT:-1883}:1883"
          - "${MOSQUITTO_WS_PORT_EXT:-59001}:9001"
        volumes:
          - ./mosquitto/config:/mosquitto/config/
        networks:
           - zemfyre-net
    nodered:
        build:
            context: ./nodered
            dockerfile: Dockerfile
        restart: always
        ports:
            - "${NODERED_PORT_EXT:-51880}:1880"
        volumes:
            - ./nodered/data:/data
            - ./nodered/nodes:/data/nodes
            - /data/node_modules
        networks:
           - zemfyre-net

    influx:
        container_name: influxdb
        image: influxdb:alpine
        restart: always
        environment:
            - INFLUXDB_INIT_ORG=Zemfyre
            - INFLUXDB_INIT_BUCKET=ZUS80LP
            - INFLUXDB_LOG_LEVEL=debug
        ports:
            - "${INFLUXDB_PORT_EXT:-58086}:8086"
        volumes:
            - ./influx/data:/var/lib/influxdb2
            - ./influx/config:/etc/influxdb2
        networks:
           - zemfyre-net

    grafana:
        build:
           context: ./grafana
           dockerfile: Dockerfile
        depends_on:
            - influx
        container_name: grafana
        restart: always
   
        user: "grafana"
        environment:
            - GF_SECURITY_ADMIN_USER=${GRAFANA_USERNAME}
            - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
            - GF_AUTH_ANONYMOUS_ENABLED=${GRAFANA_AUTH_ANONYMOUS_ENABLED}
            - GF_AUTH_ANONYMOUS_ORG_ROLE=${GRAFANA_AUTH_ANONYMOUS_ORG_ROLE}
            - GF_AUTH_DISABLE_LOGIN_FORM=${GRAFANA_AUTH_DISABLE_LOGIN_FORM}
            - GF_HTTP_ALLOW_ORIGIN=*
        ports:
            - "${GRAFANA_PORT_EXT:-53000}:3000"
        networks:
           - zemfyre-net

    admin:
        build:
           context: ./admin
           dockerfile: Dockerfile
        container_name: admin
        restart: always
        ports:
            - "${ADMIN_PORT_EXT:-51850}:80"
        networks:
           - zemfyre-net
    api:
        build:
            context: ./api
            dockerfile: Dockerfile
        container_name: zemfyre-api
        restart: always
        privileged: true
        cap_add:
            - SYS_TIME
        environment:
            - GRAFANA_API_TOKEN=${GRAFANA_API_TOKEN}
            - NODE_ENV=production
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
          - /etc/localtime:/etc/localtime:ro
          - /etc/timezone:/etc/timezone:ro
        ports:
            - "${API_PORT_EXT:-53001}:3001"
        networks:
           - zemfyre-net
 
networks:
  zemfyre-net:
    driver: bridge


